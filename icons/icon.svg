<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ddd6fe" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="shellg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Inner border highlight -->
  <rect width="128" height="128" rx="26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Top-left corner glow -->
  <ellipse cx="20" cy="18" rx="40" ry="30" fill="rgba(196,181,253,0.12)"/>

  <!-- Shell arcs — concentric C-shapes opening to the right -->
  <path d="M 35 88 C 14 80 10 72 10 64 C 10 56 14 48 35 40"
        fill="none" stroke="url(#shellg)" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 35 78 C 20 72 17 68 17 64 C 17 60 20 56 35 50"
        fill="none" stroke="rgba(167,139,250,0.5)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 35 68 C 28 66 26 65 26 64 C 26 63 28 62 35 60"
        fill="none" stroke="rgba(167,139,250,0.7)" stroke-width="3" stroke-linecap="round"/>

  <!-- Waveform bars -->
  <rect x="52" y="50" width="9" height="28" rx="4.5" fill="url(#wg)"/>
  <rect x="66" y="40" width="9" height="48" rx="4.5" fill="url(#wg)"/>
  <rect x="80" y="46" width="9" height="36" rx="4.5" fill="url(#wg)"/>
  <rect x="94" y="54" width="9" height="20" rx="4.5" fill="url(#wg)" opacity="0.75"/>
  <rect x="108" y="50" width="9" height="28" rx="4.5" fill="url(#wg)" opacity="0.5"/>
</svg>
