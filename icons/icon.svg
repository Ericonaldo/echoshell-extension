<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Subtle inner glow ring -->
  <rect width="128" height="128" rx="28" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="1.5"/>
  <!-- Shell arcs -->
  <path d="M64 100 C 34 100 14 84 14 64 C 14 44 34 28 64 28" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <path d="M64 90 C 40 90 22 78 22 64 C 22 50 40 38 64 38" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M64 80 C 46 80 30 72 30 64 C 30 56 46 48 64 48" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Waveform bars (centered at x=74, spread right) -->
  <rect x="52" y="52" width="5" height="24" rx="2.5" fill="url(#wave)" filter="url(#glow)"/>
  <rect x="61" y="44" width="5" height="40" rx="2.5" fill="url(#wave)" filter="url(#glow)"/>
  <rect x="70" y="50" width="5" height="28" rx="2.5" fill="url(#wave)" filter="url(#glow)"/>
  <rect x="79" y="56" width="5" height="16" rx="2.5" fill="url(#wave)" filter="url(#glow)"/>
  <rect x="88" y="52" width="5" height="24" rx="2.5" fill="url(#wave)" filter="url(#glow)" opacity="0.7"/>
  <!-- Dot at bottom of shell -->
  <circle cx="64" cy="100" r="3" fill="url(#accent)" opacity="0.7"/>
</svg>