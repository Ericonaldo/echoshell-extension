<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoShell</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-root">
    <!-- Header (always visible) -->
    <header class="popup-header">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="url(#lg)"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#6366f1"/>
            </linearGradient>
          </defs>
          <!-- Waveform bars -->
          <rect x="5" y="9" width="2.5" height="6" rx="1.25" fill="white" opacity="0.9"/>
          <rect x="9" y="6.5" width="2.5" height="11" rx="1.25" fill="white"/>
          <rect x="13" y="8" width="2.5" height="8" rx="1.25" fill="white" opacity="0.9"/>
          <rect x="17" y="10" width="2.5" height="4" rx="1.25" fill="white" opacity="0.7"/>
        </svg>
        <span class="logo-text">EchoShell</span>
      </div>
      <button id="settings-link" class="header-btn" title="Settings" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- VIEW: idle -->
    <div id="view-idle" class="popup-view active">
      <div class="idle-hero">
        <p class="idle-tagline">Real-time podcast transcription</p>
        <div class="site-support-list">
          <span class="site-chip">YouTube</span>
          <span class="site-chip">Bilibili</span>
          <span class="site-chip">TED</span>
          <span class="site-chip">Coursera</span>
          <span class="site-chip">+ more</span>
        </div>
      </div>
      <button id="start-transcript-btn" class="btn btn-start btn-full">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Start Transcript
      </button>
      <button id="open-panel-idle-btn" class="btn btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        Open Side Panel
      </button>
    </div>

    <!-- VIEW: detecting -->
    <div id="view-detecting" class="popup-view">
      <div class="detecting-body">
        <div class="spinner" aria-label="Detecting…"></div>
        <p class="detecting-label">Detecting native subtitles…</p>
      </div>
    </div>

    <!-- VIEW: native found -->
    <div id="view-native" class="popup-view">
      <div class="native-card">
        <div class="native-card-header">
          <svg class="native-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
          <div class="native-card-info">
            <span id="native-site-name" class="native-site-name">YouTube</span>
            <span class="native-badge">Native Subtitles</span>
          </div>
        </div>
        <label class="native-lang-label" for="native-track-select">Track / Language</label>
        <select id="native-track-select" class="native-select"></select>
      </div>
      <button id="export-to-panel-btn" class="btn btn-start btn-full">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        Export to Side Panel
      </button>
      <button id="use-ai-btn" class="btn btn-ghost use-ai-link">
        Use AI instead →
      </button>
    </div>

    <!-- VIEW: AI transcription -->
    <div id="view-ai" class="popup-view">
      <div id="no-native-notice" class="no-native-notice" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        No native subtitles found on this page
      </div>

      <!-- Status bar (AI view) -->
      <div class="status-bar">
        <div id="status-indicator" class="status-pip inactive"></div>
        <span id="status-text" class="status-label">Ready</span>
        <span id="status-timer" class="status-timer" style="display:none">0:00</span>
      </div>

      <!-- Mode selector -->
      <div class="mode-grid">
        <label class="mode-card">
          <input type="radio" name="mode" value="audio" id="mode-audio">
          <div class="mode-card-inner">
            <svg class="mode-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <span class="mode-name">Audio</span>
            <span class="mode-desc">Microphone</span>
          </div>
        </label>
        <label class="mode-card">
          <input type="radio" name="mode" value="ocr" id="mode-ocr">
          <div class="mode-card-inner">
            <svg class="mode-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <span class="mode-name">Screen</span>
            <span class="mode-desc">OCR subtitles</span>
          </div>
        </label>
        <label class="mode-card">
          <input type="radio" name="mode" value="both" id="mode-both">
          <div class="mode-card-inner">
            <svg class="mode-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            <span class="mode-name">Both</span>
            <span class="mode-desc">Combined</span>
          </div>
        </label>
      </div>

      <!-- Config warning pill -->
      <div id="config-warning" class="config-warning" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span id="config-warning-text"></span>
        <button id="config-settings-btn" class="config-settings-btn">Configure →</button>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="start-btn" class="btn btn-start">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Start Capture
        </button>
        <button id="stop-btn" class="btn btn-stop" disabled>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
          Stop
        </button>
      </div>

      <!-- Open panel -->
      <button id="open-panel-btn" class="btn btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        Open Side Panel
      </button>
    </div>

    <div id="error-msg" class="error-toast" style="display:none"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
