<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoShell - Transcript</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="panel-container">
    <header class="panel-header">
      <h1 class="panel-title">EchoShell</h1>
      <div class="header-actions">
        <button id="history-btn" class="icon-btn" title="History">📋</button>
        <button id="export-btn" class="icon-btn" title="Export">⬇</button>
        <button id="settings-btn" class="icon-btn" title="Settings">⚙</button>
        <button id="clear-btn" class="icon-btn" title="Clear">🗑</button>
      </div>
    </header>

    <!-- Main transcript view -->
    <div id="transcript-view" class="view active">
      <div id="transcript-list" class="transcript-list">
        <div class="empty-state">
          <p>No transcript yet.</p>
          <p class="hint">Click the extension icon to start capturing.</p>
        </div>
      </div>
    </div>

    <!-- History view -->
    <div id="history-view" class="view">
      <div class="view-header">
        <button id="back-btn" class="back-btn">← Back</button>
        <h2>History</h2>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>

    <!-- Export dialog -->
    <div id="export-dialog" class="dialog" style="display:none;">
      <div class="dialog-content">
        <h3>Export Transcript</h3>
        <div class="export-options">
          <label><input type="radio" name="export-format" value="txt" checked> Plain Text (.txt)</label>
          <label><input type="radio" name="export-format" value="md"> Markdown (.md)</label>
          <label><input type="radio" name="export-format" value="srt"> Subtitle (.srt)</label>
        </div>
        <div class="dialog-actions">
          <button id="export-confirm-btn" class="btn btn-primary">Export</button>
          <button id="export-cancel-btn" class="btn btn-ghost">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
